<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Satured Hub</title>

<style>
body{
    margin:0;
    background: radial-gradient(circle at top, #0f0f0f, #000);
    color:#fff;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:#111;
    padding:40px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 0 30px rgba(0,255,255,0.2);
    width:90%;
    max-width:500px;
}

h1{
    margin-bottom:20px;
    color:#0ff;
    text-shadow:0 0 10px #0ff;
}

input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    text-align:center;
    margin-bottom:15px;
    background:#000;
    color:#0f0;
    font-size:14px;
}

button{
    padding:12px 25px;
    border:none;
    border-radius:10px;
    background:#0ff;
    color:#000;
    cursor:pointer;
    font-weight:bold;
    transition:0.2s;
}

button:hover{
    background:#00cccc;
}

#timer{
    margin-top:15px;
    color:#aaa;
}

.hidden{
    display:none;
}
</style>
</head>

<body>

<div class="container">
    <h1>Satured Hub</h1>

    <div id="loading">Verifying access...</div>

    <div id="wait" class="hidden">
        <p>Complete access...</p>
        <div id="countdown"></div>
    </div>

    <div id="app" class="hidden">
        <input id="keyField" readonly>
        <button onclick="copyKey()">Copy Key</button>
        <div id="timer"></div>
    </div>
</div>

<script>
const DAY = 86400000;
const WAIT_TIME = 10; // mandatory seconds

// 🔐 Referrer check
const allowedReferrers = ["lootlabs.gg","linkvertise.com"];
const ref = document.referrer;
const hasID = new URLSearchParams(location.search).get("id");

if(!hasID && !allowedReferrers.some(site => ref.includes(site))){
    document.getElementById("loading").innerText = "You got kicked for using bypass!";
    throw "Blocked";
}

// 🔑 Generator
function randomString(len){
    const chars="ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
    let result="";
    const arr=new Uint8Array(len);
    crypto.getRandomValues(arr);
    arr.forEach(x=>result+=chars[x%chars.length]);
    return result;
}

function generateKey(){
    return "satured-hub-key-" + randomString(32);
}

function generateID(){
    return crypto.randomUUID().replace(/-/g,"").slice(0,16);
}

function getID(){
    return new URLSearchParams(location.search).get("id");
}

let timeLeft = WAIT_TIME;
let lostFocus = false;

// 👁️ Anti tab switch
document.addEventListener("visibilitychange", () => {
    if(document.hidden){
        lostFocus = true;
    }
});

function startWait(){
    document.getElementById("loading").style.display="none";
    document.getElementById("wait").classList.remove("hidden");

    const interval = setInterval(()=>{
        if(lostFocus){
            clearInterval(interval);
            location.reload(); // restarts if tab changes
        }

        timeLeft--;
        document.getElementById("countdown").innerText =
            "Wait: " + timeLeft + "s";

        if(timeLeft <= 0){
            clearInterval(interval);
            initApp();
        }
    },1000);
}

function initApp(){
    let id = getID();

    if(!id){
        const newID = generateID();
        const key = generateKey();

        localStorage.setItem("secure_"+newID, JSON.stringify({
            key:key,
            created:Date.now(),
            ua:navigator.userAgent
        }));

        // FIX: Update URL without reloading the page to prevent the double timer bug
        history.replaceState(null, "", "?id="+newID);
        id = newID; // Assign the new ID to continue execution immediately
    }

    const stored = localStorage.getItem("secure_"+id);

    if(!stored){
        document.getElementById("loading").innerText="Error";
        return;
    }

    const data = JSON.parse(stored);

    if(data.ua !== navigator.userAgent){
        document.getElementById("loading").innerText="Blocked";
        localStorage.removeItem("secure_"+id);
        return;
    }

    document.getElementById("wait").classList.add("hidden");
    document.getElementById("app").classList.remove("hidden");

    document.getElementById("keyField").value = data.key;

    function updateTimer(){
        const remaining = (data.created + DAY) - Date.now();

        if(remaining <= 0){
            document.getElementById("timer").innerText="Expired";
            return;
        }

        const h=Math.floor(remaining/3600000);
        const m=Math.floor((remaining%3600000)/60000);
        const s=Math.floor((remaining%60000)/1000);

        document.getElementById("timer").innerText =
            "Reset in: "+h+"h "+m+"m "+s+"s";
    }

    setInterval(updateTimer,1000);
    updateTimer();
}

function copyKey(){
    navigator.clipboard.writeText(
        document.getElementById("keyField").value
    );
}

// 🚀 start
startWait();

</script>

</body>
</html>
