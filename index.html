<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Satured Hub</title>

<style>
body {
    margin: 0;
    background: linear-gradient(135deg, #0a0a0a, #111);
    color: white;
    font-family: Arial;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Card */
.container {
    background: #111;
    padding: 40px;
    border-radius: 15px;
    box-shadow: 0 0 40px rgba(0,0,0,0.8);
    text-align: center;
    width: 400px;
}

/* Input */
input {
    width: 100%;
    padding: 12px;
    border: none;
    background: #000;
    color: #0f0;
    text-align: center;
    margin-top: 15px;
    font-size: 14px;
}

/* Button */
button {
    margin-top: 15px;
    padding: 10px 25px;
    background: #fff;
    border: none;
    cursor: pointer;
}

button:hover {
    background: #ddd;
}

#error {
    color: red;
    font-size: 18px;
}
</style>

</head>
<body>

<div class="container" id="app" style="display:none;">
    <h2>Satured Hub Key</h2>
    <input id="keyField" readonly>
    <button onclick="copyKey()">Copy</button>
</div>

<div id="error" style="display:none;">
    YOU YOU GET KICK FOR USING BYPASS  
    <br>  
    JELIPOLLAS
</div>

<script>

// ================= CHECK TOKEN =================
const params = new URLSearchParams(location.search);
const access = params.get("access");

// 🔒 Si no tiene token → bloqueado
if (!access || !access.startsWith("LINK_OK")) {
    document.getElementById("error").style.display = "block";
} else {
    document.getElementById("app").style.display = "block";

    // ================= GENERATE KEY =================
    function randomString(length) {
        const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
        let result = "";
        for (let i = 0; i < length; i++) {
            result += chars.charAt(Math.floor(Math.random() * chars.length));
        }
        return result;
    }

    const key = "satured-hub-key-" + randomString(20);
    document.getElementById("keyField").value = key;
}

// ================= COPY =================
function copyKey() {
    navigator.clipboard.writeText(document.getElementById("keyField").value);
}

</script>

</body>
</html>
